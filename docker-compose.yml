version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cuchao_db
    environment:
      POSTGRES_DB: cuchao_db
      POSTGRES_USER: cuchao_user
      POSTGRES_PASSWORD: Cuchao123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuchao_user -d cuchao_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: cuchao_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: '1'
      DB_NAME: cuchao_db
      DB_USER: cuchao_user
      DB_PASSWORD: Cuchao123
      DB_HOST: db
      DB_PORT: '5432'
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  static_volume:
  media_volume:
