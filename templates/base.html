<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cuchao - Compra y Venta de Carros{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'carros/styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="{% url 'catalogo' %}">Cuchao</a>
            </div>
            <div class="nav-right">
                {% if user.is_authenticated %}
                    <span style="color: white; margin-right: 15px;">Hola, {{user.username}}</span>
                    <a href="{% url 'logout' %}" class="btn-login">Logout</a>
                    {% if user.is_staff %}
                        <a href="/admin/" class="btn-register">Panel Admin</a>
                    {% endif %}
                {% else %}
                    <a href="{% url 'login' %}" class="btn-login">Login</a>
                    <a href="{% url 'register' %}" class="btn-register">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
